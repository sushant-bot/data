      - UploadOptionsMethod
      - PreviewMethod
      - PreviewOptionsMethod
      - PreprocessMethod
      - PreprocessOptionsMethod
      - QualityMethod
      - QualityOptionsMethod
      - TrainMethod
      - TrainOptionsMethod
      - RecommendationsMethod
      - RecommendationsOptionsMethod
      - VisualizationsMethod
      - VisualizationsOptionsMethod
      - SessionsMethod
      - SessionsOptionsMethod
    Properties:
      RestApiId: !Ref RestAPI
      Description: 'API Deployment for AI Data Analyst Platform'

  # Lambda Invoke Permissions
