  # API Stage
  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestAPI
      DeploymentId: !Ref APIDeployment
      StageName: !Ref Environment
      Description: !Sub 'API Stage for ${Environment} environment'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          ThrottlingRateLimit: 100
          ThrottlingBurstLimit: 200
      Tags:
        - Key: 'Project'
          Value: !Ref ProjectName
        - Key: 'Environment'
          Value: !Ref Environment

Outputs:
  RestAPIId:
    Description: 'ID of the REST API'
    Value: !Ref RestAPI
    Export:
      Name: !Sub '${AWS::StackName}-RestAPIId'

  RestAPIRootResourceId:
    Description: 'Root Resource ID of the REST API'
    Value: !GetAtt RestAPI.RootResourceId
    Export:
      Name: !Sub '${AWS::StackName}-RestAPIRootResourceId'

  APIGatewayURL:
    Description: 'URL of the API Gateway'
    Value: !Sub 'https://${RestAPI}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-APIGatewayURL'

  APIKeyId:
    Description: 'ID of the API Key'
    Value: !Ref APIKey
    Export:
      Name: !Sub '${AWS::StackName}-APIKeyId'