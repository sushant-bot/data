AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway for AI Data Analyst Platform - REST API with CORS and rate limiting'

Parameters:
  ProjectName:
    Type: String
    Default: 'ai-data-analyst-platform'
    Description: 'Name of the project for resource naming'
  
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Environment name'

  UploadLambdaArn:
    Type: String
    Description: 'ARN of the Upload Lambda function'
    Default: 'arn:aws:lambda:us-east-1:123456789012:function:placeholder'

  PreviewLambdaArn:
    Type: String
    Description: 'ARN of the Preview Lambda function'
    Default: 'arn:aws:lambda:us-east-1:123456789012:function:placeholder'

  ProcessingLambdaArn:
    Type: String
    Description: 'ARN of the Processing Lambda function'
    Default: 'arn:aws:lambda:us-east-1:123456789012:function:placeholder'

  MLTrainingLambdaArn:
    Type: String
    Description: 'ARN of the ML Training Lambda function'
    Default: 'arn:aws:lambda:us-east-1:123456789012:function:placeholder'

  AIAssistantLambdaArn:
    Type: String
    Description: 'ARN of the AI Assistant Lambda function'
    Default: 'arn:aws:lambda:us-east-1:123456789012:function:placeholder'

  VisualizationLambdaArn:
    Type: String
    Description: 'ARN of the Visualization Lambda function'
    Default: 'arn:aws:lambda:us-east-1:123456789012:function:placeholder'

  SessionLambdaArn:
    Type: String
    Description: 'ARN of the Session Lambda function'
    Default: 'arn:aws:lambda:us-east-1:123456789012:function:placeholder'

Resources:
  # REST API Gateway
  RestAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-api-${Environment}'
      Description: 'REST API for AI Data Analyst Platform'
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: '*'
      Tags:
        - Key: 'Project'
          Value: !Ref ProjectName
        - Key: 'Environment'
          Value: !Ref Environment

  # API Gateway Request Validator
  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      RestApiId: !Ref RestAPI
      Name: 'RequestValidator'
      ValidateRequestBody: true
      ValidateRequestParameters: true

  # Usage Plan for Rate Limiting
  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub '${ProjectName}-usage-plan-${Environment}'
      Description: 'Usage plan with rate limiting for AI Data Analyst Platform'
      Throttle:
        RateLimit: 100
        BurstLimit: 200
      Quota:
        Limit: 10000
        Period: DAY
      ApiStages:
        - ApiId: !Ref RestAPI
          Stage: !Ref APIStage

  # API Key for Usage Plan
  APIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub '${ProjectName}-api-key-${Environment}'
      Description: 'API Key for AI Data Analyst Platform'
      Enabled: true

  # Usage Plan Key Association
  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  # Upload Resource (/upload)
  UploadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestAPI
      ParentId: !GetAtt RestAPI.RootResourceId
      PathPart: 'upload'

  # Upload POST Method
  UploadMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestAPI
      ResourceId: !Ref UploadResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: false
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
        - StatusCode: '400'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
        - StatusCode: '500'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UploadLambdaArn}/invocations'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"

  # Upload OPTIONS Method for CORS
  UploadOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestAPI
      ResourceId: !Ref UploadResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true

  # Preview Resource (/preview/{sessionId})
  PreviewResource:
