# Lambda Function Deployment Configuration
# AI Data Analyst Platform - All Lambda Functions

functions:
  upload:
    name: ai-data-analyst-upload
    description: "Handles CSV file upload, validation, PII detection, and basic statistics"
    runtime: python3.11
    handler: lambda_function.lambda_handler
    memory: 1024
    timeout: 300
    environment:
      DATA_BUCKET: ai-data-analyst-data-bucket
      SESSIONS_TABLE: ai-data-analyst-sessions
      AWS_DEFAULT_REGION: us-east-1
    permissions:
      - s3:GetObject
      - s3:PutObject
      - dynamodb:PutItem
      - bedrock:InvokeModel
      - bedrock:ApplyGuardrail
      - logs:CreateLogGroup
      - logs:CreateLogStream
      - logs:PutLogEvents

  preview:
    name: ai-data-analyst-preview
    description: "Generates dataset preview and detailed statistics"
    runtime: python3.11
    handler: lambda_function.lambda_handler
    memory: 1024
    timeout: 300
    environment:
      DATA_BUCKET: ai-data-analyst-data-bucket
      SESSIONS_TABLE: ai-data-analyst-sessions
      AWS_DEFAULT_REGION: us-east-1
    permissions:
      - s3:GetObject
      - dynamodb:GetItem
      - logs:CreateLogGroup
      - logs:CreateLogStream
      - logs:PutLogEvents

  processing:
    name: ai-data-analyst-processing
    description: "Handles data preprocessing operations including null handling, scaling, encoding, and quality assessment"
    runtime: python3.11
    handler: lambda_function.lambda_handler
    memory: 2048
    timeout: 600
    environment:
      DATA_BUCKET: ai-data-analyst-data-bucket
      SESSIONS_TABLE: ai-data-analyst-sessions
      OPERATIONS_TABLE: ai-data-analyst-operations
      AWS_DEFAULT_REGION: us-east-1
    permissions:
      - s3:GetObject
      - s3:PutObject
      - dynamodb:GetItem
      - dynamodb:PutItem
      - dynamodb:UpdateItem
      - logs:CreateLogGroup
      - logs:CreateLogStream
      - logs:PutLogEvents

  ml_training:
    name: ai-data-analyst-ml-training
    description: "Trains supervised and unsupervised ML models with metrics and visualization generation"
    runtime: python3.11
    handler: lambda_function.lambda_handler
    memory: 2048
    timeout: 900
    environment:
      BUCKET_NAME: ai-data-analyst-data-bucket
      SESSIONS_TABLE: ai-data-analyst-sessions
      OPERATIONS_TABLE: ai-data-analyst-operations
      AWS_DEFAULT_REGION: us-east-1
    permissions:
      - s3:GetObject
      - s3:PutObject
      - dynamodb:GetItem
      - dynamodb:PutItem
      - dynamodb:Query
      - logs:CreateLogGroup
      - logs:CreateLogStream
      - logs:PutLogEvents

  visualization:
    name: ai-data-analyst-visualization
    description: "Generates charts: correlation heatmaps, confusion matrices, ROC curves, cluster plots, feature importance"
    runtime: python3.11
    handler: lambda_function.lambda_handler
    memory: 1024
    timeout: 300
    environment:
      BUCKET_NAME: ai-data-analyst-data-bucket
      OPERATIONS_TABLE: ai-data-analyst-operations
      AWS_DEFAULT_REGION: us-east-1
    permissions:
      - s3:GetObject
      - s3:PutObject
      - dynamodb:PutItem
      - dynamodb:Query
      - logs:CreateLogGroup
      - logs:CreateLogStream
      - logs:PutLogEvents

  ai_assistant:
    name: ai-data-analyst-ai-assistant
    description: "AI-powered recommendations using Bedrock with caching, retry logic, and rule-based fallback"
    runtime: python3.11
    handler: lambda_function.lambda_handler
    memory: 1024
    timeout: 300
    environment:
      BUCKET_NAME: ai-data-analyst-data-bucket
      SESSIONS_TABLE: ai-data-analyst-sessions
      AI_DECISIONS_TABLE: ai-data-analyst-ai-decisions
      CACHE_TABLE: ai-data-analyst-cache
      OPERATIONS_TABLE: ai-data-analyst-operations
      BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
      AWS_DEFAULT_REGION: us-east-1
    permissions:
      - s3:GetObject
      - dynamodb:GetItem
      - dynamodb:PutItem
      - dynamodb:Query
      - bedrock:InvokeModel
      - logs:CreateLogGroup
      - logs:CreateLogStream
      - logs:PutLogEvents

# Shared layer for logging utilities
layers:
  shared:
    name: ai-data-analyst-shared
    description: "Shared logging utilities and error handling"
    compatible_runtimes:
      - python3.11
    source: shared/

# API Gateway Integration
api_endpoints:
  - path: /upload
    method: POST
    function: upload
    cors: true

  - path: /preview/{sessionId}
    method: GET
    function: preview
    cors: true

  - path: /preprocess
    method: POST
    function: processing
    cors: true

  - path: /quality/{sessionId}
    method: GET
    function: processing
    cors: true

  - path: /train
    method: POST
    function: ml_training
    cors: true

  - path: /visualizations
    method: POST
    function: visualization
    cors: true

  - path: /visualizations/{sessionId}
    method: GET
    function: visualization
    cors: true

  - path: /recommendations/{sessionId}
    method: GET
    function: ai_assistant
    cors: true
